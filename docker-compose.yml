version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  # Uncomment to run local S3-compatible storage (MinIO)
  # minio:
  #   image: minio/minio
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   volumes:
  #     - minio_data:/data
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
  #     interval: 30s
  #     timeout: 20s
  #     retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=/var/lib/arishem/arishem.db
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_USE_SSL=${S3_USE_SSL}
      - CLERK_JWKS_URL=${CLERK_JWKS_URL}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EXPECTS_UNSAFE_CODE=true
      - ARISHEM_HOST_PATH=${ARISHEM_HOST_PATH}
    volumes:
      - ./backend/data:/var/lib/arishem
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/arishem:/tmp/arishem
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-eu-west-1}
        awslogs-group: arishem-backend
        awslogs-stream: backend-${HOSTNAME:-ecs}
        awslogs-create-group: "true"
    # depends_on:
      # minio:
      #   condition: service_healthy

volumes:
  minio_data:
  caddy_data:
  caddy_config: